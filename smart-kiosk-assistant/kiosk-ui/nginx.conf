# nginx reverse proxy for the kiosk React SPA.
# Serves the static bundle and proxies backend calls so the browser uses a
# single origin (mirrors the Vite dev proxy in vite.config.ts).

server {
    listen 7860;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large audio chunk uploads (WAV POSTs to kiosk-core).
    client_max_body_size 25m;

    # ── kiosk-core (path preserved: backend already serves /api/...) ──────────
    location /api/ {
        proxy_pass http://kiosk-core:8012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── rag-service (strip /rag prefix) ───────────────────────────────────────
    location /rag/ {
        proxy_pass http://rag-service:8020/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # ── text-to-speech (strip /tts prefix) ────────────────────────────────────
    location /tts/ {
        proxy_pass http://text-to-speech:8011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # ── audio-analyzer / ASR (strip /asr prefix) ──────────────────────────────
    location /asr/ {
        proxy_pass http://audio-analyzer:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # ── metrics-collector (strip /metrics-svc prefix) ─────────────────────────
    location /metrics-svc/ {
        proxy_pass http://metrics-collector:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
