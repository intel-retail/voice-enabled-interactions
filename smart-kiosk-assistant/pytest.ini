[pytest]
testpaths = tests/functional
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    tier1: CI-safe functional tests — no Docker, no ML models, no audio hardware
    tier2: Docker-required tests — build and run kiosk-core container
    tier3: Full-stack tests — requires all 5 services with real ML models (self-hosted only)

addopts =
    -v
    --tb=short
    --strict-markers

log_cli = true
log_cli_level = WARNING
